<html>
  <head>
    <title>5461 passos - AR experience</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style= "margin: 0px; overflow: hidden">     
    <!-- we add detectionMode and matrixCodeType to tell AR.js to recognize barcode markers -->
    <a-scene vr-mode-ui="enabled: false" embedded arjs="debugUIEnabled: false; sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
      
      <a-assets>
        <!--Put list of pictures here-->
        <img id="img1" src="./photo1.jpg" crossorigin="anonymous">
        <img id="img2" src="./photo2.jpg" crossorigin="anonymous">
        <img id="img3" src="./photo3.jpg" crossorigin="anonymous">
        <img id="img4" src="./photo4.jpg" crossorigin="anonymous">
        <img id="img5" src="./photo5.jpg" crossorigin="anonymous">
        <img id="img6" src="./photo6.jpg" crossorigin="anonymous">
      </a-assets>
      
      <!--code for custom pattern type-->
      <!--<a-marker type="pattern" preset="custom" url="./pattern-circle.patt">-->

      <!--foto 1-->
      <a-marker type="barcode" value="0">
        <a-image
          src="#img1"
          position="0 0 0"
          rotation="-90 0 0"
          width="2"
          height="2"
          material="transparent: true; alphaTest: 0.5; side: double;">
        </a-image>
      </a-marker>

      <!--foto 2-->
      <a-marker type="barcode" value="1">
        <a-image
          src="#img2"
          position="0 0 0"
          rotation="-90 0 0"
          width="2"
          height="2"
          material="transparent: true; alphaTest: 0.5; side: double;">
        </a-image>
      </a-marker>

      <!--foto 3-->
      <a-marker type="barcode" value="2">
        <a-image
          src="#img3"
          position="0 0 0"
          rotation="-90 0 0"
          width="2"
          height="2"
          material="transparent: true; alphaTest: 0.5; side: double;">
        </a-image>
      </a-marker>

      <!--foto 4-->
      <a-marker type="barcode" value="3">
        <a-image
          src="#img4"
          position="0 0 0"
          rotation="-90 0 0"
          width="2"
          height="2"
          material="transparent: true; alphaTest: 0.5; side: double;">
        </a-image>
      </a-marker>

      <!--foto 5-->
      <a-marker type="barcode" value="4">
        <a-image
          src="#img5"
          position="0 0 0"
          rotation="-90 0 0"
          width="2"
          height="2"
          material="transparent: true; alphaTest: 0.5; side: double;">
        </a-image>
      </a-marker>

      <!--foto 6-->
      <a-marker type="barcode" value="5">
        <a-image
          src="#img6"
          position="0 0 0"
          rotation="-90 0 0"
          width="2"
          height="2"
          material="transparent: true; alphaTest: 0.5; side: double;">
        </a-image>
      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
