<html>
  <head>
    <title>Primeira experiência de RA usando Hiro como marcador e um modelo de cubo do A-frame</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style= "margin: 0px; overflow: hidden"> 
    <a-scene vr-mode-ui="enabled: false" embedded arjs="debugUIEnabled: false">      
      
      <a-assets>
        <img id="img1" src="/img1.jpg" crossorigin="anonymous">
      </a-assets>
      
      <a-marker preset="hiro">
        <a-image
          src="#img1"
          position="0 0 0"
          rotation="-90 0 0"
          width="1"
          height="1"
          material="transparent: true; alphaTest: 0.5; side: double;">
        </a-image>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
